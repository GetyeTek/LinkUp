name: Deploy Academic Engine (Heaven Academy)
on:
  push:
    branches: [ main ]
    paths: [ 'packages/heaven-academy/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build --workspace=@linkup/heaven-academy
      - name: Deploy to Edge
        run: echo "Simulating deployment to Academic CDN Shard..."