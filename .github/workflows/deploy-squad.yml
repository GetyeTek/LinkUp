name: Sync-Social-Graph
on:
  push:
    branches: [ main ]
    paths: [ 'packages/squad/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build --workspace=@linkup/squad
      - name: Deploy to Edge
        run: echo "Simulating deployment to Chat App Servers..."