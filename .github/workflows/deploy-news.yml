name: Push-Discovery-Frontend
on:
  push:
    branches: [ main ]
    paths: [ 'packages/gibi-news/**' ]
jobs:
  Push-Discovery-Frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Image Optimization Check
        run: echo "Verifying thumbnail optimization formats... PASS"
      - run: npm run build --workspace=@linkup/gibi-news
      - name: Deploy to Edge
        run: echo "Simulating deployment to News CDN Shard..."