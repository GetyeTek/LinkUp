name: Deploy Discovery Module (Gibi News)
on:
  push:
    branches: [ main ]
    paths: [ 'packages/gibi-news/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build --workspace=@linkup/gibi-news
      - name: Deploy to Edge
        run: echo "Simulating deployment to News CDN Shard..."